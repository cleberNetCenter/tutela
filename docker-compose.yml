services:
  nginx:
    image: nginx:1.27-alpine
    container_name: tutela-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/site:/var/www/site:ro
    depends_on:
      - backend
    networks:
      - tutela-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutela-backend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tutela
      - DB_USER=tutela
      - DB_PASSWORD=${DB_PASSWORD:-tutela_dev_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - tutela-net

  postgres:
    image: postgres:16-alpine
    container_name: tutela-postgres
    environment:
      - POSTGRES_DB=tutela
      - POSTGRES_USER=tutela
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tutela_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tutela-net

  redis:
    image: redis:7-alpine
    container_name: tutela-redis
    networks:
      - tutela-net

networks:
  tutela-net:
    driver: bridge

volumes:
  postgres-data:
