<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO PRESERVADO -->
  <title>Ativos Digitais Empresariais | Tutela Digital®</title>
  <meta name="description" content="Governança, integridade e cadeia de custódia para ativos digitais empresariais." />
  <link rel="canonical" href="https://tuteladigital.com.br/empresas.html" />
  <link href="assets/illustrations/favicon.svg" rel="icon" type="image/svg+xml" />

  <!-- CSS ORIGINAL -->
  <link rel="stylesheet" href="assets/css/main.css?v=4" />
  <link rel="stylesheet" href="assets/css/styles-header-final.css?v=4" />
  <link rel="stylesheet" href="assets/css/pages/solucoes.css?v=1" />
</head>

<body class="solucoes-page empresas-page">

  <!--#include virtual="/partials/header.html" -->

  <main>

    <!-- HERO -->
    <section class="sol-hero">
      <div class="sol-watermark" aria-hidden="true"><span>EMP</span></div>
      <div class="sol-hero-rule" aria-hidden="true"></div>

      <div class="container">

        <p class="sol-hero-eyebrow" data-i18n="companies.heroEyebrow"></p>

        <h1 class="sol-fade-up">
          <span data-i18n="companies.heroTitle"></span>
        </h1>

        <p class="sol-hero-subtitle sol-fade-up d1" data-i18n="companies.heroSubtitle"></p>

        <!-- BADGES PRESERVADOS -->
        <div class="sol-hero-badges sol-fade-up d2">
          <span class="sol-badge" data-i18n="companies.badge1"></span>
          <span class="sol-badge" data-i18n="companies.badge2"></span>
          <span class="sol-badge" data-i18n="companies.badge3"></span>
        </div>

      </div>
    </section>

    <!-- INTRO -->
    <section class="sol-intro">
      <div class="container">

        <div class="sol-intro-grid">

          <div class="sol-intro-lead">
            <h2 data-i18n="companies.introTitle"></h2>
            <p data-i18n="companies.introP1"></p>
            <p data-i18n="companies.introP2"></p>
          </div>

          <aside class="sol-aside">
            <p class="sol-aside-label" data-i18n="companies.asideLabel"></p>
            <p data-i18n="companies.asideContent"></p>
          </aside>

        </div>

      </div>
    </section>

    <div class="sol-divider"></div>

    <!-- BASE LEGAL -->
    <section class="sol-normativo">
      <div class="container">

        <h2 data-i18n="companies.normativeTitle"></h2>

      </div>
    </section>

    <div class="sol-divider"></div>

    <!-- CONTRASTE -->
    <section class="sol-contraste">
      <div class="container">

        <h2 data-i18n="companies.riskTitle"></h2>
        <p data-i18n="companies.riskLead"></p>

        <div class="sol-contraste-grid">

          <!-- SEM GOVERNANÇA -->
          <div class="sol-col sol-col-neg">
            <p class="sol-col-label" data-i18n="companies.without"></p>

            <div class="sol-comp-item">
              <p data-i18n="companies.risk1"></p>
            </div>
            <div class="sol-comp-item">
              <p data-i18n="companies.risk2"></p>
            </div>
            <div class="sol-comp-item">
              <p data-i18n="companies.risk3"></p>
            </div>
            <div class="sol-comp-item">
              <p data-i18n="companies.risk4"></p>
            </div>
          </div>

          <!-- COM GOVERNANÇA -->
          <div class="sol-col sol-col-pos">
            <p class="sol-col-label" data-i18n="companies.with"></p>

            <div class="sol-comp-item">
              <p data-i18n="companies.benefit1"></p>
            </div>
            <div class="sol-comp-item">
              <p data-i18n="companies.benefit2"></p>
            </div>
            <div class="sol-comp-item">
              <p data-i18n="companies.benefit3"></p>
            </div>
            <div class="sol-comp-item">
              <p data-i18n="companies.benefit4"></p>
            </div>
          </div>

        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <!--#include virtual="/partials/footer.html" -->
  <!--#include virtual="/partials/scripts.html" -->

  <!-- I18N SCRIPT -->
  <script>
    async function loadLanguage(lang) {
      const res = await fetch(`/assets/i18n/${lang}.json`);
      const t = await res.json();

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const keys = el.dataset.i18n.split('.');
        let value = t;
        keys.forEach(k => value = value?.[k]);
        if (value) el.innerHTML = value;
      });
    }

    loadLanguage(localStorage.getItem('lang') || 'pt-br');
  </script>

</body>

</html>
