name: Generate Sitemap

on:
  push:
    branches:
      - main
      - homolog
      - feature/legal-structure
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap
        run: |
          rm -f public/sitemap.xml

          echo '<?xml version="1.0" encoding="UTF-8"?>' >> public/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> public/sitemap.xml

          FILES=$(git ls-files | grep '^public/.*\.html$')

          for file in $FILES; do

            # ❌ Ignora partials
            if [[ "$file" == public/partials/* ]]; then
              continue
            fi

            clean=${file#public/}

            # 🔥 TRATAMENTO CORRETO DE INDEX
            if [[ "$clean" == "index.html" ]]; then
              url=""
            elif [[ "$clean" == */index.html ]]; then
              url=${clean%index.html}
            else
              url=${clean%.html}
            fi

            # 🔥 GARANTE SLASH FINAL
            if [[ "$url" == "" ]]; then
              final_url="https://tuteladigital.com.br/"
            else
              final_url="https://tuteladigital.com.br/${url%/}/"
            fi

            # 🎯 PRIORIDADE INTELIGENTE
            priority="0.8"
            changefreq="monthly"

            if [[ "$url" == "" ]]; then
              priority="1.0"
              changefreq="weekly"
            elif [[ "$url" == insights/ ]]; then
              priority="0.8"
              changefreq="weekly"
            elif [[ "$url" == insights/* ]]; then
              priority="0.7"
            elif [[ "$url" == legal/* ]]; then
              priority="0.5"
              changefreq="yearly"
            fi

            lastmod=$(git log -1 --format="%cd" --date=format:'%Y-%m-%d' -- "$file")

            echo "  <url>" >> public/sitemap.xml
            echo "    <loc>$final_url</loc>" >> public/sitemap.xml
            echo "    <lastmod>$lastmod</lastmod>" >> public/sitemap.xml
            echo "    <changefreq>$changefreq</changefreq>" >> public/sitemap.xml
            echo "    <priority>$priority</priority>" >> public/sitemap.xml
            echo "  </url>" >> public/sitemap.xml

          done

          echo '</urlset>' >> public/sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/sitemap.xml
          git commit -m "chore: auto update sitemap" || echo "No changes"

          # 🔥 PUSH NA BRANCH ATUAL (CORRETO)
          git push origin HEAD

      # 🔄 SINCRONIZAÇÃO COM HOMOLOG (SEGURA)
      - name: Sync main to homolog
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch origin
          git checkout homolog
          git merge origin/main --no-edit
          git push origin homolog

      # 🚀 GARANTE O REDEPLOY REAL DE HOMOLOG
      # O push acima é feito com o GITHUB_TOKEN do próprio workflow. Por
      # proteção anti-recursão do GitHub, pushes feitos com o GITHUB_TOKEN
      # não disparam outros workflows — então o "Deploy Homolog" (que só
      # escuta push em homolog) nunca era acionado por essa sincronização,
      # e o servidor de homolog ficava com o container desatualizado mesmo
      # com a branch já sincronizada. workflow_dispatch via API é uma das
      # exceções permitidas para o GITHUB_TOKEN, então disparamos explicitamente.
      - name: Trigger Deploy Homolog
        if: github.ref == 'refs/heads/main'
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-homolog.yml/dispatches" \
            -d '{"ref":"homolog"}'