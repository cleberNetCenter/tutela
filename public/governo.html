</head>

<body class="solucoes-page governo-page">

  <!--#include virtual="/partials/header.html" -->

  <main>

    <!-- HERO -->

        <p class="sol-hero-eyebrow" data-i18n="government.heroEyebrow"></p>

        <h1 class="sol-fade-up" data-i18n="government.heroTitle"></h1>

        <div class="sol-hero-badges">

          <span class="sol-badge">LGPD · LAI</span>

    </section>

    <!-- INTRO -->
    <section class="sol-intro">
      <div class="container">

        <div class="sol-intro-grid">

          <div>
            <h2 data-i18n="government.introTitle"></h2>
            <p data-i18n="government.introP1"></p>
            <p data-i18n="government.introP2"></p>
          </div>

          <aside class="sol-aside">
            <p class="sol-aside-label" data-i18n="government.asideLabel"></p>
            <p data-i18n="government.asideContent"></p>
          </aside>

        </div>

      </div>
    </section>

    <div class="sol-divider"></div>

    <!-- RISCO -->
    <section class="sol-contraste">
      <div class="container">

        <h2 data-i18n="government.desafioTitle"></h2>
        <p data-i18n="government.desafioLead"></p>

        <div class="sol-contraste-grid">

          <div class="sol-col sol-col-neg">
            <p data-i18n="government.semEstruturaLabel"></p>

            <p data-i18n="government.sem1"></p>
            <p data-i18n="government.sem2"></p>
            <p data-i18n="government.sem3"></p>
          </div>

          <div class="sol-col sol-col-pos">
            <p data-i18n="government.comEstruturaLabel"></p>

            <p data-i18n="government.com1"></p>
            <p data-i18n="government.com2"></p>
            <p data-i18n="government.com3"></p>
          </div>

        </div>

      </div>
    </section>

    <div class="sol-divider"></div>

    <!-- BENEFÍCIOS -->
    <section class="sol-beneficios">
      <div class="container">

        <h2 data-i18n="government.whatChangesTitle"></h2>
        <p data-i18n="government.whatChangesLead"></p>

        <ul>
          <li data-i18n="government.check1"></li>
          <li data-i18n="government.check2"></li>
          <li data-i18n="government.check3"></li>
          <li data-i18n="government.check4"></li>
        </ul>

      </div>
    </section>

    <div class="sol-divider"></div>

    <!-- CASOS DE USO -->
    <section class="sol-impacto">
      <div class="container">

        <h2 data-i18n="government.useCasesTitle2"></h2>
        <p data-i18n="government.useCasesLead"></p>

        <ul>
          <li>
            <strong data-i18n="government.useCase1Title"></strong>

          <li>

            <span data-i18n="government.useCase2Desc"></span>
          </li>
          <li>
            <strong data-i18n="government.useCase3Title"></strong>
            <span data-i18n="government.useCase3Desc"></span>
          </li>
          <li>
            <strong data-i18n="government.useCase4Title"></strong>
            <span data-i18n="government.useCase4Desc"></span>

        <p data-i18n="government.useCaseDisclaimer"></p>

    <!-- CTA -->
    <section class="sol-cta">
      <div class="container">

        <h2 data-i18n="government.ctaSubtitle"></h2>

        <a href="/diagnostico.html" class="sol-btn-primary"
           data-i18n="global.ctaPrimary"></a>

      </div>
    </section>

  </main>

  <!--#include virtual="/partials/footer.html" -->

  <!-- I18N -->
  <script>
    async function loadLanguage(lang) {
      const res = await fetch(`/assets/i18n/${lang}.json`);
      const t = await res.json();

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const keys = el.dataset.i18n.split(".");
        let val = t;

        keys.forEach(k => val = val?.[k]);

        if (val) el.innerHTML = val;
      });
    }

    const lang = localStorage.getItem("lang") || "pt-br";
    loadLanguage(lang);
  </script>

</body>
</html>
