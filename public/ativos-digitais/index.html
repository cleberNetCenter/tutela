<body class="exec-compact">
  <div class="app">
    <!--#include virtual="/partials/header.html" -->
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <ol>
        <li><a href="/" data-i18n="navigation.home"></a></li>
        <li aria-current="page" data-i18n="navigation.digitalAssets"></li>
      </ol>
    </nav>
    <!--#include virtual="/partials/ativos-digitais-pillar-main.html" -->
    <!--#include virtual="/partials/footer.html" -->
    <!--#include virtual="/partials/scripts.html" -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const applyMeta = () => {
          if (!window.I18N || !I18N.translations || Object.keys(I18N.translations).length === 0) {
            setTimeout(applyMeta, 50);
            return;
          }
          document.title = I18N.t('ativosDigitais.pillar.hero.title');
          const metaDescription = document.querySelector('meta[name="description"]');
          const ogTitle = document.querySelector('meta[property="og:title"]');
          const ogDescription = document.querySelector('meta[property="og:description"]');
          const twitterTitle = document.querySelector('meta[property="twitter:title"]');
          const twitterDescription = document.querySelector('meta[property="twitter:description"]');
          const description = I18N.currentLang === 'pt'
            ? 'Custódia, sucessão e governança de ativos digitais com base jurídica e integridade verificável'
            : I18N.currentLang === 'en'
              ? 'Custody, succession, and governance of digital assets with legal basis and verifiable integrity'
              : 'Custodia, sucesión y gobernanza de activos digitales con base jurídica e integridad verificable';
          if (metaDescription) metaDescription.setAttribute('content', description);
          if (ogTitle) ogTitle.setAttribute('content', document.title);
          if (ogDescription) ogDescription.setAttribute('content', description);
          if (twitterTitle) twitterTitle.setAttribute('content', document.title);
          if (twitterDescription) twitterDescription.setAttribute('content', description);
          document.documentElement.lang = I18N.getLangCode(I18N.currentLang);
        };
        applyMeta();
      });
    </script>
  </div>
</body>

</html>
